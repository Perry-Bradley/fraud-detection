apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sms
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/sms-backend:latest
          ports: [{ containerPort: 5000 }]
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: ML_SERVICE_URL
              value: http://ml-service:8000
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: sms-secrets, key: DB_NAME } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: sms-secrets, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: sms-secrets, key: DB_PASSWORD } }
            - name: DJANGO_SECRET_KEY
              valueFrom: { secretKeyRef: { name: sms-secrets, key: DJANGO_SECRET_KEY } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: sms-secrets, key: JWT_SECRET } }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /health/, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/, port: 5000 }
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: sms
spec:
  selector: { app: backend }
  ports: [{ port: 5000, targetPort: 5000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: sms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
