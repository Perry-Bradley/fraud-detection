apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: sms
spec:
  replicas: 1
  selector:
    matchLabels: { app: ml-service }
  template:
    metadata:
      labels: { app: ml-service }
    spec:
      containers:
        - name: ml-service
          image: ghcr.io/your-org/sms-ml-service:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: sms
spec:
  selector: { app: ml-service }
  ports: [{ port: 8000, targetPort: 8000 }]
