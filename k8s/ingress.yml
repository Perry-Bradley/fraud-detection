apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sms-ingress
  namespace: sms
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [sms.example.com]
      secretName: sms-tls
  rules:
    - host: sms.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 5000 } }
          - path: /admin
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 5000 } }
          - path: /static
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 5000 } }
          - path: /health
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 5000 } }
          - path: /metrics
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 5000 } }
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
