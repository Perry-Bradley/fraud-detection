apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels: { app.kubernetes.io/name: backend, app.kubernetes.io/instance: {{ .Release.Name }} }
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels: { app: backend, release: {{ .Release.Name }} }
  template:
    metadata:
      labels: { app: backend, release: {{ .Release.Name }} }
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.registry }}/{{ .Values.image.org }}/sms-backend:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports: [{ containerPort: 5000 }]
          envFrom:
            - secretRef: { name: {{ .Release.Name }}-secrets }
          env:
            - name: DB_HOST
              value: {{ .Release.Name }}-postgres
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis:6379/0"
            - name: ML_SERVICE_URL
              value: "http://{{ .Release.Name }}-ml-service:8000"
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health/, port: 5000 }
          livenessProbe:
            httpGet: { path: /health/, port: 5000 }
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
spec:
  selector: { app: backend, release: {{ .Release.Name }} }
  ports: [{ port: 5000, targetPort: 5000 }]
