apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sms
  namespace: argocd
  # Keep the app around until its child resources are cleaned up.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sms

  source:
    repoURL: https://github.com/Perry-Bradley/SMS418.git
    targetRevision: main
    path: helm/sms-chart
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: sms

  syncPolicy:
    automated:
      prune: true      # delete resources removed from git
      selfHeal: true   # revert manual drift back to git state
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
