# Ansible runs against the control workstation that drives the DOKS cluster.
# By default everything targets localhost (your machine / CI runner), where
# kubectl + helm + doctl are installed and pointed at the cluster.
#
# To instead provision a remote bastion/CI host, replace localhost with its
# IP and set ansible_user / ansible_ssh_private_key_file.

[control]
localhost ansible_connection=local

[control:vars]
# doctl/kubectl context is assumed to already target the cluster
# (Terraform output `kubeconfig_command` sets this up).
kube_namespace=sms
